name: F1 MLOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  train-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4 # Updated to V4 (Node 24)

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5 # Updated to V5 (Node 24)
        with:
          python-version: "3.10"

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 📁 Create directories
        run: mkdir -p data models

      - name: 🏋️ Train model
        run: python src/train_no_mlflow.py

      - name: ✅ Lint check
        run: |
          pip install flake8
          flake8 src/ app/ --max-line-length=120 --ignore=E501,W503 || true

      - name: 🚀 API health check
        run: |
          python -c "
          import sys, os
          sys.path.insert(0, os.getcwd())
          from app.main import app
          from fastapi.testclient import TestClient
          
          client = TestClient(app)
          response = client.get('/health')
          assert response.status_code == 200
          assert response.json()['model_loaded'] is True
          print('✅ FastAPI health check passed with model loaded')
          "
