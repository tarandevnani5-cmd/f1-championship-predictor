<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>F1 Championship Predictor</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
    }

    /* ── HERO HEADER ── */
    .header {
      background: linear-gradient(135deg, #e10600 0%, #8b0000 50%, #0a0a0a 100%);
      padding: 48px 24px 60px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '🏎️';
      font-size: 120px;
      position: absolute;
      top: -20px;
      right: -20px;
      opacity: 0.08;
    }
    .header h1 {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 900;
      letter-spacing: -1px;
      text-shadow: 0 2px 20px rgba(0,0,0,0.5);
    }
    .header h1 span { color: #ff4444; }
    .header p {
      margin-top: 10px;
      font-size: 16px;
      color: rgba(255,255,255,0.7);
      font-weight: 300;
    }

    /* ── MAIN CONTAINER ── */
    .container {
      max-width: 680px;
      margin: -30px auto 60px;
      padding: 0 20px;
    }

    /* ── CARD ── */
    .card {
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 36px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .card-title {
      font-size: 18px;
      font-weight: 700;
      color: #e10600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── FORM FIELDS ── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    .form-grid.single { grid-template-columns: 1fr; }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: rgba(255,255,255,0.5);
    }
    label span {
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      text-transform: none;
      letter-spacing: 0;
      font-weight: 400;
    }

    input {
      background: #1f1f1f;
      border: 1.5px solid #2e2e2e;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: 'Inter', sans-serif;
    }
    input:focus {
      border-color: #e10600;
      box-shadow: 0 0 0 3px rgba(225,6,0,0.15);
    }
    input::placeholder { color: #444; font-weight: 400; font-size: 15px; }

    /* ── DRIVER QUICK SELECT ── */
    .quick-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 10px;
    }
    .quick-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 24px;
    }
    .quick-btn {
      background: #1f1f1f;
      border: 1.5px solid #2e2e2e;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      transition: all 0.2s;
    }
    .quick-btn:hover {
      border-color: #e10600;
      color: #fff;
      background: #2a1010;
    }

    /* ── PREDICT BUTTON ── */
    .predict-btn {
      width: 100%;
      background: linear-gradient(135deg, #e10600, #ff4444);
      border: none;
      border-radius: 12px;
      padding: 18px;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: transform 0.15s, box-shadow 0.2s;
      margin-top: 8px;
    }
    .predict-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(225,6,0,0.4);
    }
    .predict-btn:active { transform: translateY(0); }
    .predict-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* ── RESULT CARD ── */
    .result {
      margin-top: 24px;
      border-radius: 16px;
      padding: 28px;
      display: none;
      animation: fadeIn 0.4s ease;
    }
    .result.champion {
      background: linear-gradient(135deg, #0d2b0d, #1a4a1a);
      border: 1.5px solid #2d7a2d;
    }
    .result.not-champion {
      background: linear-gradient(135deg, #1a0d0d, #2e1010);
      border: 1.5px solid #6b2020;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-icon {
      font-size: 48px;
      text-align: center;
      margin-bottom: 12px;
    }
    .result-verdict {
      font-size: 20px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 16px;
    }
    .result.champion .result-verdict { color: #4cff4c; }
    .result.not-champion .result-verdict { color: #ff6b6b; }

    .result-stats {
      display: flex;
      justify-content: center;
      gap: 32px;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .stat {
      text-align: center;
    }
    .stat-value {
      font-size: 28px;
      font-weight: 900;
    }
    .result.champion .stat-value { color: #4cff4c; }
    .result.not-champion .stat-value { color: #ff6b6b; }
    .stat-label {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    /* ── ERROR ── */
    .error {
      margin-top: 16px;
      background: #2a1010;
      border: 1px solid #6b2020;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 14px;
      color: #ff6b6b;
      display: none;
    }

    /* ── LOADING ── */
    .loading {
      display: none;
      text-align: center;
      padding: 20px;
      color: rgba(255,255,255,0.5);
      font-size: 14px;
    }
    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #e10600;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── DIVIDER ── */
    .divider {
      border: none;
      border-top: 1px solid #2a2a2a;
      margin: 24px 0;
    }

    @media (max-width: 480px) {
      .form-grid { grid-template-columns: 1fr; }
      .card { padding: 24px; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>🏎️ F1 <span>Championship</span> Predictor</h1>
  <p>Enter a driver's season stats to predict if they'll win the World Championship</p>
</div>

<div class="container">
  <div class="card">

    <div class="card-title">⚡ Quick Fill — Real Drivers</div>

    <div class="quick-title">Select a driver to auto-fill</div>
    <div class="quick-buttons">
      <button class="quick-btn" onclick="fill(454,19,21,1,22)">Verstappen 2023</button>
      <button class="quick-btn" onclick="fill(575,19,21,1,22)">Verstappen 2023 Full</button>
      <button class="quick-btn" onclick="fill(413,11,17,1,21)">Hamilton 2019</button>
      <button class="quick-btn" onclick="fill(408,11,17,2,21)">Hamilton 2018</button>
      <button class="quick-btn" onclick="fill(200,5,9,4,22)">Leclerc 2022</button>
      <button class="quick-btn" onclick="fill(100,1,3,6,20)">Backmarker</button>
    </div>

    <hr class="divider">

    <div class="card-title">📊 Driver Season Stats</div>

    <div class="form-grid">
      <div class="field">
        <label>Championship Points <span>(total)</span></label>
        <input type="number" id="points" placeholder="e.g. 400" min="0" max="700"/>
      </div>
      <div class="field">
        <label>Race Wins</label>
        <input type="number" id="wins" placeholder="e.g. 12" min="0" max="25"/>
      </div>
    </div>

    <div class="form-grid">
      <div class="field">
        <label>Podiums <span>(top 3 finishes)</span></label>
        <input type="number" id="podiums" placeholder="e.g. 17" min="0" max="25"/>
      </div>
      <div class="field">
        <label>DNFs <span>(did not finish)</span></label>
        <input type="number" id="dnfs" placeholder="e.g. 2" min="0" max="25"/>
      </div>
    </div>

    <div class="form-grid single">
      <div class="field">
        <label>Races Entered <span>(total races in season)</span></label>
        <input type="number" id="races_entered" placeholder="e.g. 22" min="1" max="25"/>
      </div>
    </div>

    <button class="predict-btn" onclick="predict()">
      🏁 PREDICT CHAMPIONSHIP
    </button>

    <div class="loading" id="loading">
      <span class="spinner"></span> Analysing driver stats...
    </div>

    <div class="error" id="error"></div>

    <div class="result" id="result">
      <div class="result-icon" id="result-icon"></div>
      <div class="result-verdict" id="result-verdict"></div>
      <div class="result-stats">
        <div class="stat">
          <div class="stat-value" id="result-chance"></div>
          <div class="stat-label">Championship Chance</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="result-label"></div>
          <div class="stat-label">Prediction</div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  function fill(points, wins, podiums, dnfs, races) {
    document.getElementById('points').value       = points;
    document.getElementById('wins').value         = wins;
    document.getElementById('podiums').value      = podiums;
    document.getElementById('dnfs').value         = dnfs;
    document.getElementById('races_entered').value = races;
  }

  async function predict() {
    const points        = parseFloat(document.getElementById('points').value);
    const wins          = parseFloat(document.getElementById('wins').value);
    const podiums       = parseFloat(document.getElementById('podiums').value);
    const dnfs          = parseFloat(document.getElementById('dnfs').value);
    const races_entered = parseFloat(document.getElementById('races_entered').value);

    // Validate
    if ([points, wins, podiums, dnfs, races_entered].some(isNaN)) {
      showError('Please fill in all fields before predicting.');
      return;
    }

    // Reset UI
    document.getElementById('result').style.display = 'none';
    document.getElementById('error').style.display  = 'none';
    document.getElementById('loading').style.display = 'block';
    document.querySelector('.predict-btn').disabled  = true;

    try {
      const response = await fetch('http://localhost:8000/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ points, wins, podiums, dnfs, races_entered })
      });

      const data = await response.json();

      document.getElementById('loading').style.display = 'none';
      document.querySelector('.predict-btn').disabled  = false;

      const resultEl  = document.getElementById('result');
      const isChamp   = data.is_champion === 1;

      resultEl.className         = 'result ' + (isChamp ? 'champion' : 'not-champion');
      resultEl.style.display     = 'block';
      document.getElementById('result-icon').textContent    = isChamp ? '🏆' : '😞';
      document.getElementById('result-verdict').textContent = isChamp
        ? 'WORLD CHAMPION!'
        : 'Not the Champion';
      document.getElementById('result-chance').textContent  = data.championship_chance;
      document.getElementById('result-label').textContent   = isChamp ? 'YES' : 'NO';

    } catch (err) {
      document.getElementById('loading').style.display = 'none';
      document.querySelector('.predict-btn').disabled  = false;
      showError('Could not connect to the API. Make sure the server is running on localhost:8000');
    }
  }

  function showError(msg) {
    const el = document.getElementById('error');
    el.textContent    = '⚠️ ' + msg;
    el.style.display  = 'block';
  }
</script>

</body>
</html>
